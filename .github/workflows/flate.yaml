---
name: Flate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    name: Flate Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup flate
        uses: home-operations/flate/action@main
        with:
          cache: true

      - name: Run flate test
        run: flate test all --path ./clusters/prod --base main

  diff:
    name: Flate Diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup flate
        uses: home-operations/flate/action@main
        with:
          cache: true

      - name: Run flate diff
        run: |
          flate diff all --path ./clusters/prod --base main --output github > flate.diff
          [ -s flate.diff ] || rm flate.diff

      - name: Upload diff
        if: ${{ hashFiles('flate.diff') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flate-diff
          path: flate.diff
          retention-days: 1

  flate-status:
    name: Flate Success
    needs:
      - test
      - diff
    runs-on: ubuntu-latest
    permissions: {}
    if: ${{ always() }}
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
