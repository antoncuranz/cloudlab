---
name: Flate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    name: Flate Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup flate
        uses: home-operations/flate/action@main
        with:
          cache: true

      - name: Run flate test
        run: flate test all

  diff:
    name: Flate Diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup flate
        uses: home-operations/flate/action@main
        with:
          cache: true

      - name: Run flate diff
        run: >-
          flate diff all
          --output diff
          > diff.patch

      - name: Generate Diff Summary
        run: |
          touch diff.patch
          cat diff.patch
          if [ -s diff.patch ]; then
            {
              echo "### Flate Diff"
              echo '```diff'
              cat diff.patch
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No diff output" >> "$GITHUB_STEP_SUMMARY"
          fi

