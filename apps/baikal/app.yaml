---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: baikal
  namespace: baikal
spec:
  interval: 15m
  dependsOn:
    - name: external-secrets-store
      namespace: secrets
  components:
    - ../../../components/volsync
  postBuild:
    substitute:
      APP: baikal
      VOLSYNC_PUID: "101"
      VOLSYNC_GUID: "101"
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: baikal
  path: ./apps/baikal/app
  prune: true
  wait: true
  timeout: 5m0s
