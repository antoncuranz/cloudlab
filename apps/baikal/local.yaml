---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: baikal
  namespace: baikal
spec:
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: baikal
  path: ./apps/baikal/app
  components:
    - ../../../components/volsync-local
  postBuild:
    substitute:
      APP: baikal
      VOLSYNC_PUID: "101"
      VOLSYNC_PGID: "101"
