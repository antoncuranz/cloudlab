---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kompass
  namespace: kompass
spec:
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kompass
  path: ./apps/kompass/app
  components:
    - ../../../components/volsync
  postBuild:
    substitute:
      APP: kompass
      VOLSYNC_CAPACITY: 10Gi
