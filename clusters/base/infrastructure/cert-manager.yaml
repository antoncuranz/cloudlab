---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: cert-manager-crds
  namespace: networking
spec:
  interval: 1h
  ref:
    tag: v1.20.2
  url: https://github.com/cert-manager/cert-manager
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-crds
  namespace: networking
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: cert-manager-crds
    namespace: networking
  path: ./deploy/crds
  prune: true
  wait: true
  timeout: 5m0s
---
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: networking
spec:
  interval: 1h
  dependsOn:
    - name: cert-manager-crds
      namespace: networking
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/networking/cert-manager/base
  prune: true
  wait: true
  timeout: 5m0s
