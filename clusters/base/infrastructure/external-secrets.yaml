---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: external-secrets-crds
  namespace: secrets
spec:
  interval: 1m0s
  ref:
    tag: v0.20.4
  url: https://github.com/external-secrets/external-secrets
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-crds
  namespace: secrets
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: external-secrets-crds
    namespace: secrets
  path: ./deploy/crds
  prune: true
  wait: true
  timeout: 5m0s
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: secrets
spec:
  interval: 1m0s
  dependsOn:
    - name: onepassword
      namespace: secrets
    - name: external-secrets-crds
      namespace: secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/secrets/external-secrets/base
  prune: true
  wait: true
  timeout: 5m0s
