---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: baikal
  namespace: baikal
spec:
  components:
    - ../../../components/volsync
  postBuild:
    substitute:
      APP: baikal
      VOLSYNC_PUID: "101"
      VOLSYNC_PGID: "101"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app
  namespace: kompass
spec:
  components:
    - ../../../components/volsync
  postBuild:
    substitute:
      APP: kompass
      VOLSYNC_CAPACITY: 10Gi
