---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
  namespace: networking
spec:
  interval: 1h
  dependsOn:
    - name: cilium
      namespace: networking
    - name: cert-manager
      namespace: networking
    - name: envoy-gateway-crds
      namespace: networking
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/base/networking/envoy-gateway/app
  prune: true
  wait: true
  timeout: 5m0s
