---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: envoy-gateway-crds
  namespace: networking
spec:
  interval: 1h
  ref:
    tag: v1.8.1
  url: https://github.com/envoyproxy/gateway
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway-crds
  namespace: networking
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: envoy-gateway-crds
    namespace: networking
  path: ./charts/gateway-helm/charts/crds/crds
  prune: true
  wait: true
  timeout: 5m0s
