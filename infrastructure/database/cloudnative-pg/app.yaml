---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg
  namespace: database
spec:
  dependsOn:
    - name: cloudnative-pg-crds
      namespace: database
    - name: external-secrets
      namespace: secrets
    - name: democratic-csi
      namespace: storage
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/database/cloudnative-pg/app
