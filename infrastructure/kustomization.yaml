apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./monitoring/namespace.yaml
  - ./monitoring/routes/app.yaml
  - ./monitoring/node-exporter/app.yaml
  - ./monitoring/kube-state-metrics/app.yaml

  - ./networking/namespace.yaml
  - ./networking/cilium/app.yaml
  - ./networking/cilium/configs.yaml
  - ./networking/envoy-gateway/app.yaml
  - ./networking/envoy-gateway/gateway.yaml
  - ./networking/cert-manager/app.yaml
