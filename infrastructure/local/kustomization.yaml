---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - ./dummy-secrets.yaml
patches:
  - path: ./patches/cert-manager-kustomization.yaml
    target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: cert-manager
      namespace: networking
  - path: ./patches/external-dns-kustomization.yaml
    target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: external-dns
      namespace: networking
  - path: ./patches/external-secrets-kustomization.yaml
    target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: external-secrets
      namespace: secrets
  - path: ./patches/onepassword-kustomization.yaml
    target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: onepassword
      namespace: secrets
