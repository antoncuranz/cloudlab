apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: networking
spec:
  patches:
    - patch: |-
        - op: remove
          path: /spec/acme
        - op: add
          path: /spec/selfSigned
          value: {}
      target:
        kind: ClusterIssuer
        name: letsencrypt-prod
