apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-dns
  namespace: networking
spec:
  patches:
    - patch: |-
        - op: replace
          path: /spec/values/txtOwnerId
          value: cloudlab-local
        - op: add
          path: /spec/values/domainFilters
          value:
            - local.test
      target:
        kind: HelmRelease
        name: external-dns
        namespace: networking
