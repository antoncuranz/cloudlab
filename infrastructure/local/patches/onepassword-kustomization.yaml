apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: onepassword
  namespace: secrets
spec:
  patches:
    - patch: |-
        - op: add
          path: /spec/values/connect/replicas
          value: 0
      target:
        kind: HelmRelease
        name: onepassword
        namespace: secrets
