---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: routes
  namespace: monitoring
spec:
  dependsOn:
    - name: external-secrets
      namespace: secrets
    - name: envoy-gateway
      namespace: networking
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/monitoring/routes/app
