---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: networking
spec:
  dependsOn:
    - name: cert-manager-crds
      namespace: networking
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/networking/cert-manager/base
  patches:
    - target:
        kind: ClusterIssuer
        name: letsencrypt-prod
      patch: |-
        - op: remove
          path: /spec/acme
        - op: add
          path: /spec/selfSigned
          value: {}
