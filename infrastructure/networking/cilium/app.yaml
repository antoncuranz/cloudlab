---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: networking
spec:
  interval: 1h
  dependsOn:
    - name: gateway-api-crds
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/networking/cilium/app
  prune: true
  wait: true
  timeout: 10m0s
