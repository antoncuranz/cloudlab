---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
  namespace: networking
spec:
  dependsOn:
    - name: cilium
      namespace: networking
    - name: cert-manager
      namespace: networking
    - name: envoy-gateway-crds
      namespace: networking
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/networking/envoy-gateway/app
