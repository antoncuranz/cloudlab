kind: Kustomization
metadata:
  name: envoy-gateway-crds
  namespace: networking
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: envoy-gateway-crds
    namespace: networking
  path: ./charts/gateway-helm/charts/crds/crds
  prune: true
  wait: true
  timeout: 5m0s
