---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: secrets
spec:
  dependsOn:
    - name: onepassword
      namespace: secrets
    - name: external-secrets-crds
      namespace: secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/secrets/external-secrets/env-prod
