apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-store
  namespace: secrets
spec:
  interval: 1m0s
  dependsOn:
    - name: external-secrets
      namespace: secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/secrets/external-secrets/store
  prune: true
  wait: true
  timeout: 5m0s
