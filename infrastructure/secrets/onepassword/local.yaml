---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: onepassword
  namespace: secrets
spec:
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/secrets/onepassword/app
  patches:
    - target:
        kind: HelmRelease
        name: onepassword
        namespace: secrets
      patch: |-
        - op: add
          path: /spec/values/connect/replicas
          value: 0
