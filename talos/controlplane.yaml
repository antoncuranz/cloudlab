machine:
  type: controlplane
  ca:
    crt: op://Cloudlab/talos/MACHINE_CA_CRT
    key: op://Cloudlab/talos/MACHINE_CA_KEY

cluster:
  ca:
    crt: op://Cloudlab/talos/CLUSTER_CA_CRT
    key: op://Cloudlab/talos/CLUSTER_CA_KEY
  aggregatorCA:
    crt: op://Cloudlab/talos/CLUSTER_AGGREGATORCA_CRT
    key: op://Cloudlab/talos/CLUSTER_AGGREGATORCA_KEY
  serviceAccount:
    key: op://Cloudlab/talos/CLUSTER_SERVICEACCOUNT_KEY
  etcd:
    ca:
      crt: op://Cloudlab/talos/CLUSTER_ETCD_CA_CRT
      key: op://Cloudlab/talos/CLUSTER_ETCD_CA_KEY
  secretboxEncryptionSecret: op://Cloudlab/talos/CLUSTER_SECRETBOXENCRYPTIONSECRET

  apiServer:
    image: registry.k8s.io/kube-apiserver:v1.36.3
    extraArgs:
      feature-gates: MutablePVNodeAffinity=true
    certSANs:
      - {{ op://Cloudlab/talos/API_ENDPOINT_DNS }}
      - {{ op://Cloudlab/talos/OLD_IPV4 }}
      - {{ op://Cloudlab/talos/G1_IPV4 }}
    disablePodSecurityPolicy: true

    auditPolicy:
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
        - level: Metadata

  controllerManager:
    image: registry.k8s.io/kube-controller-manager:v1.36.2

  scheduler:
    image: registry.k8s.io/kube-scheduler:v1.36.2

  allowSchedulingOnControlPlanes: true
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: trustd-ingress
portSelector:
  ports:
    - 50001
  protocol: tcp
ingress:
  - subnet: {{ op://Cloudlab/talos/OLD_IPV4 }}/32
  - subnet: {{ op://Cloudlab/talos/G1_IPV4 }}/32
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: kubernetes-api-ingress
portSelector:
  ports:
    - 6443
  protocol: tcp
ingress:
  - subnet: 0.0.0.0/0
  - subnet: ::/0
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: etcd-ingress
portSelector:
  ports:
    - 2379-2380
  protocol: tcp
ingress:
  - subnet: {{ op://Cloudlab/talos/OLD_IPV4 }}/32
  - subnet: {{ op://Cloudlab/talos/G1_IPV4 }}/32
